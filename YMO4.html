<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y.M.Ooparts ∞</title>

<style>

/* =========================
   レコードUI
========================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0e0e0e;
    color: #f5f5f5;
}

/* レコード全体 */
.record {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
    box-sizing: border-box;
}

/* ジャケット */
.cover img {
    width: 320px;
    max-width: 100%;
    height: auto;
    display: block;
}

/* トラックリスト */
.tracklist {
    flex: 1;
}

.tracklist h1 {
    font-size: 22px;
    margin: 0 0 16px 0;
}

.tracklist ol {
    padding-left: 18px;
    line-height: 1.8;
    font-size: 14px;
}

/* スマホ対応 */
@media (max-width: 600px) {
    .record {
        flex-direction: column;
        gap: 16px;
    }

    .cover img {
        width: 100%;
    }
}

</style>
</head>

<body>

<!-- レコード本体 -->
<div class="record">

    <!-- ジャケット -->
    <div class="cover">
    <img src="images/YMO4.png" alt="Y.M.Ooparts ∞ Jacket">
</div>

    <!-- トラックリスト -->
    <div class="tracklist">

        <h1>Y.M.Ooparts ∞</h1>

        <ol>
  <li>Opening</li>
  <li>Tighten Up (Japanese Gentlemen Stand Up Please !)</li>
  <li>開け心－磁性紀－</li>
  <li>Day Tripper</li>
  <li>コンピューターおばあちゃん</li>
  <li>ハイスクールララバイ</li>
  <li>Multiplies</li>
  <li>赤道小町ドキッ</li>
  <li>君に、胸キュン。</li>
  <li>Pure Jam</li>
  <li>The End Of Asia</li>
  <li>はらいそ</li>
</ol>

    </div>

</div>

</body>
</html>
