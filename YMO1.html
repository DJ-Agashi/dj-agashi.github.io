<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y.M.Ooparts 1</title>

<style>

/* =========================
   レコードUI
========================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0e0e0e;
    color: #f5f5f5;
}

/* レコード全体 */
.record {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
    box-sizing: border-box;
}

/* ジャケット */
.cover img {
    width: 320px;
    max-width: 100%;
    height: auto;
    display: block;
}

/* トラックリスト */
.tracklist {
    flex: 1;
}

.tracklist h1 {
    font-size: 22px;
    margin: 0 0 16px 0;
}

.tracklist ol {
    padding-left: 18px;
    line-height: 1.8;
    font-size: 14px;
}

/* スマホ対応 */
@media (max-width: 600px) {
    .record {
        flex-direction: column;
        gap: 16px;
    }

    .cover img {
        width: 100%;
    }
}
   .tracklist a {
    color: inherit;
    text-decoration: none;
}
   .tracklist a:hover {
    color: #7fd4ff;
    text-decoration: underline;
}

</style>
</head>

<body>

<!-- レコード本体 -->
<div class="record">

    <!-- ジャケット -->
    <div class="cover">
    <img src="images/YMO1.png" alt="Y.M.Ooparts 1 Jacket">
</div>

    <!-- トラックリスト -->
    <div class="tracklist">

        <h1>Y.M.Ooparts 1</h1>

        <ol>
  <li>Computer Game</li>
  <li>Firecracker</li>
  <li>1000 Knives</li>
  <li>Cosmic Surfin'</li>
  <li>Kai-Koh</li>
  <li>Tong Poo</li>
  <li>Rydeen (The Graham Massey Remix)</li>
  <li><a href="ut.html">U.T.</a></li>
  <li>Technopolis</li>
  <li>Rydeen</li>
</ol>

    </div>

</div>

</body>
</html>
