<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>妄想対談 with Michael Jackson Pt.1</title>

<style>

/* =========================
   レコードUI
========================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0e0e0e;
    color: #f5f5f5;
}

/* レコード全体 */
.record {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
    box-sizing: border-box;
}

/* ジャケット */
.cover img {
    width: 320px;
    max-width: 100%;
    height: auto;
    display: block;
}

/* トラックリスト */
.tracklist {
    flex: 1;
}

.tracklist h1 {
    font-size: 22px;
    margin: 0 0 16px 0;
}

.tracklist ol {
    padding-left: 18px;
    line-height: 1.8;
    font-size: 14px;
}

/* スマホ対応 */
@media (max-width: 600px) {
    .record {
        flex-direction: column;
        gap: 16px;
    }

    .cover img {
        width: 100%;
    }
}
.talk-page{
    max-width:800px;
    margin:40px auto;
    padding:20px;
    box-sizing:border-box;
}

.cover-image{
    display:block;
    width:320px;
    max-width:100%;
    margin:0 auto 30px;
}

.talk-page h1{
    text-align:center;
}

.talk-page h2{
    margin-top:40px;
}

.talk-page p{
    line-height:1.9;
    font-size:16px;
}
</style>
</head>

<body>

<!-- レコード本体 -->
<div class="talk-page">

    <img src="images/MuJic&Me.png"
         alt="MuJic & Me 1 Jacket"
         class="cover-image">

    <h1>妄想対談 with Michael Jackson Pt.1</h1>

    <p><em>
    ※この対談はフィクションです。<br>
    Michael Jackson本人の実際の発言ではありません。
    </em></p>

    <hr>

    <h2>Prologue</h2>

    <p><strong>Michael：</strong><br>
    全部聴かせてもらったよ。ありがとう。
    </p>

    <p><strong>Agashi：</strong><br>
    話すとちょっと長くなるよ（笑）。
    </p>

</div>
