<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0e0e0e;
    color: #f5f5f5;
}

header {
    padding: 40px 20px;
    text-align: center;
}

h1 {
    margin: 0;
    font-size: 32px;
}

/* ===== セクション共通 ===== */
section {
    max-width: 900px;
    margin: 0 auto 18px;
    padding: 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

h2 {
    border-left: 4px solid #888;
    padding-left: 10px;
    margin-bottom: 15px;
}

/* ===== Latest ===== */
.latest {
    background: linear-gradient(
        180deg,
        #ffffff 0%,
        #f5f5f5 60%,
        #e8e8e8 100%
    );
    color: #111;
}

.latest h2 {
    color: #111;
    border-left: 4px solid #d4af37;
}
    .latest {
    margin-bottom: 10px;
}

/* ===== Featured ===== */
.featured-title {
    max-width: 900px;
    margin: 20px auto 10px;
    padding: 0 20px;
    font-weight: bold;
    color: #ccc;
}

/* ===== MJ ===== */
.mj {
    background: #c1121f;
}

/* ===== YMO ===== */
.ymo {
    background: linear-gradient(
        135deg,
        #111,
        #b89b5e,
        #e6e6e6,
        #2a2a2a
    );
}
    .ymo {
    margin-bottom: 10px;
}

/* ===== Archive ===== */
.archive {
    background: #0b0b0f;
}

/* ===== Mix ===== */
.mix {
    margin-bottom: 12px;
}

.mix iframe {
    width: 100%;
    height: 120px;
    border: none;
    display: block;
}
</style>
</head>
